<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python GIF Creator</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>


<body>

<div class="container">

    <div class="logo">
        🌿
    </div>

    <h1>🌿 Python GIF Creator</h1>

    <p>Upload your favorite images and create an animated GIF in seconds.</p>


    <form method="POST" enctype="multipart/form-data">


        <label class="upload-box" id="drop-area">

            <span>📸</span>

            <p>Choose your images</p>

            <small>JPG, PNG supported</small>

            <input id="imageInput" 
                   type="file" 
                   name="images" 
                   multiple 
                   required>

        </label>


        <p id="fileCount"></p>


        <div id="preview"></div>


        <br>


        <button type="submit" onclick="showLoading()">
            <label for="speed"><b>🎬 Animation Speed</b></label>

<br><br>

<select name="speed" id="speed">

    <option value="1000">🐢 Slow</option>

    <option value="500" selected>🚶 Medium</option>

    <option value="200">🚀 Fast</option>

</select>

<br><br>

<label for="size"><b>📏 GIF Size</b></label>

<br><br>

<select name="size" id="size">

    <option value="300">🟢 Small (300 × 300)</option>

    <option value="500" selected>🟢 Medium (500 × 500)</option>

    <option value="800">🟢 Large (800 × 800)</option>

</select>

<br><br>

    ✨ Create GIF
</button>

<p id="loading"></p>


    </form>



    {% if gif_ready %}

<div class="result">

    <h2>🎉 Your GIF is Ready!</h2>

    <img src="/output/animation.gif" class="gif-preview">

    <br><br>

    <a href="/download">

        <button>

            ⬇ Download GIF

        </button>

    </a>

</div>

{% endif %}



</div>



<script>

const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const fileCount = document.getElementById("fileCount");
const dropArea = document.getElementById("drop-area");


dropArea.addEventListener("dragover", function(e){

    e.preventDefault();

    dropArea.classList.add("dragover");

});


dropArea.addEventListener("dragleave", function(){

    dropArea.classList.remove("dragover");

});


dropArea.addEventListener("drop", function(e){

    e.preventDefault();

    dropArea.classList.remove("dragover");

    imageInput.files = e.dataTransfer.files;

    imageInput.dispatchEvent(new Event("change"));

});


imageInput.addEventListener("change", function(){

    preview.innerHTML = "";

    let files = imageInput.files;

    fileCount.innerHTML = files.length + " image(s) selected";


    for(let file of files){

        let img = document.createElement("img");

        img.src = URL.createObjectURL(file);

        preview.appendChild(img);

    }

});
function showLoading(){

    document.getElementById("loading").innerHTML =
    "⏳ Creating your GIF... Please wait 🌿";

}

</script>


</body>

</html>
